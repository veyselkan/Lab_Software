name: CI Pipeline

on:
  push:
    branches: [ "develop", "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Lint with flake8
      run: |
        flake8 . --max-line-length=150
        
    - name: Run tests
      run: |
        pytest --cov=cart --cov-report=term-missing --cov-fail-under=70

  deploy:
    needs: [build-and-test] # Sadece testler geçerse çalışır
    if: github.ref == 'refs/heads/main' # Sadece main dalındaysa çalışır
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Deploy to Railway
      uses: bervProject/railway-deploy@main
      with:
        railway_token: ${{ secrets.RAILWAY_TOKEN }}
        service: "Lab_Software"
